title: LLM Evaluation Guidelines
description: A comprehensive guide to evaluating Large Language Models across various use cases
remote_theme: just-the-docs/just-the-docs

# URL settings
url: "https://WisamulHaque.github.io"
baseurl: "/emumba_llm_evaluation"

# Enable search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Navigation structure
nav_external_links:
  - title: GitHub Repository
    url: https://github.com/WisamulHaque/emumba_llm_evaluation

# Footer content
footer_content: "Copyright &copy; 2026 Emumba. Distributed under the MIT License."

# Color scheme
color_scheme: light

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Collections for use cases
collections:
  use-cases:
    permalink: "/:collection/:path/"
    output: true

# Default front matter
defaults:
  - scope:
      path: "docs/use-cases"
      type: "pages"
    values:
      layout: "default"
      parent: "Use Cases"

# Aux links (top right)
aux_links:
  "View on GitHub":
    - "https://github.com/WisamulHaque/emumba_llm_evaluation"

aux_links_new_tab: true

# Heading anchor links
heading_anchors: true

# Code copy button
enable_copy_code_button: true

# Callouts
callouts:
  warning:
    title: Warning
    color: yellow
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

# Exclude from processing
exclude:
  - examples/
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
