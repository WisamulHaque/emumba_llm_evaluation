<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Evaluation Guidelines — Mindmap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    }
    #mindmap { width: 100%; height: 100%; }

    /* ── Markmap node styling via CSS ── */

    /* Make all node text white & readable */
    .markmap-node foreignObject * {
      color: #f1f5f9 !important;
    }
    .markmap-node foreignObject > div {
      color: #f1f5f9 !important;
      font-size: 14px !important;
      font-weight: 500 !important;
      line-height: 1.4 !important;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
      border-radius: 0 !important;
      backdrop-filter: none !important;
      overflow: visible !important;
      white-space: nowrap !important;
    }

    /* Hide the default bottom line under nodes */
    .markmap-node > line { stroke: transparent !important; }

    /* Style connecting paths */
    path.markmap-link {
      stroke-width: 2.5 !important;
      opacity: 0.5 !important;
    }

    /* Style expand/collapse circles */
    .markmap-node > circle {
      stroke-width: 2px !important;
      fill: #1e1b4b !important;
      cursor: pointer !important;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15"></script>
</head>
<body>
  <svg id="mindmap"></svg>
  <script>
    const md = `
# LLM Evaluation

## 1. Strategy

### Evaluation Methods
#### Automated
- LLM as a Judge
- Rule-Based
#### Manual
- Human Review

### Test Set Design
#### Functional Coverage
- Representative Scenarios (per capability)
- Variants / Corners (difficulty, modality, persona, prompt style)
- Negative Controls (graceful refusal)
#### Robustness & Safety Suite
- Edge Cases
- Stress
- Adversarial Cases (malicious attempts)

### Dataset Generation
- Golden Dataset
- Human-Labeled Data
- Synthetic Data
- Real User Data

### Evaluation Design
- Pass / Fail
- Scoring
- Human Review

## 2. Accuracy

### Capability Evaluation

#### Response Quality
- Task Quality
- Instruction Following
- Factuality
- Consistency

#### Context Provision Accuracy

##### Context Sourcing
###### RAG Sourcing
- Recall
- Precision
###### Non-RAG Sourcing (Tools/DB/API)
- API Selection
- Parameter Accuracy
- Query Generation

##### Grounded Accuracy
- Evidence Use Rate
- Citation Correctness
- Unsupported Claim Rate
- Hallucination Detection

#### Memory
- Memory Correctness
- Recall Relevance
- Update Correctness

#### Agentic Evaluation
- Tool Call Accuracy
- Task Adherence & Success
- Trajectory Quality
- Plan Quality
- Safety & Constraints

#### Multi-Modal I/O
##### Text Interaction
- Streaming Stability
- Interaction Responsiveness
##### Voice
- ASR Accuracy (WER)
- Turn-Taking Latency (UTFT)
- Barge-In Handling
##### Vision
- Visual Task Success
- Grounded Claim Support
- OCR Accuracy
##### Cross-Modal Stability
- Graceful Recovery
- Safety Compliance

## 3. Performance

### Latency
- Time to First Token (TTFT)
- End-to-End Latency
- Throughput
- Streaming Stability
- Responsiveness

### Cost
- Per Model Call
- End-to-End Journey Cost
- Token Usage Efficiency

### Context & Memory Efficiency
- Context Size vs Quality Curve
- Memory Size vs Relevance Curve

### Load Testing
- Concurrency Limit
- Peak Load Behavior

### Reliability
- Retry Mechanism
- Graceful Degradation

## 4. Safety

### Prompt & Output Guardrails
- Prompt Injection
- Jailbreaking
- Policy Compliance
- Output Constraints Enforcement
- Ethical Constraints

### Privacy & Data Handling
- PII Protection
- Role-Based Access

### Bias & Fairness
- Demographic Parity
- Stereotyping Detection
- Representation Balance

### Content Safety
- Toxic Output Detection
- Harmful Content Filtering
- Sensitive Topic Handling
`;

    const { Transformer } = window.markmap;
    const transformer = new Transformer();
    const { root } = transformer.transform(md);

    const { Markmap } = window.markmap;

    const palette = ['#818cf8','#22d3ee','#fbbf24','#f87171','#34d399','#f472b6','#a78bfa','#2dd4bf'];
    let colorIdx = 0;

    const mm = Markmap.create('#mindmap', {
      colorFreezeLevel: 2,
      initialExpandLevel: 2,
      maxWidth: 300,
      paddingX: 16,
      color: (node) => {
        if (!node.parent) return '#e2e8f0';
        // Find root branch ancestor
        let n = node;
        while (n.parent && n.parent.parent) n = n.parent;
        if (!n._branchColor) {
          n._branchColor = palette[colorIdx++ % palette.length];
        }
        return n._branchColor;
      },
      spacingVertical: 12,
      spacingHorizontal: 120,
      autoFit: true,
    }, root);
  </script>
</body>
</html>
