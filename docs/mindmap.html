<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Evaluation Guidelines — Mindmap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #mindmap { width: 100%; height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15"></script>
</head>
<body>
  <svg id="mindmap"></svg>
  <script>
    const md = `
# LLM Evaluation Areas

## Cat 1: Simple LLM Apps\\n(with Data Sources)

### 1.1 Chat with Documents (RAG)
- Retrieval Accuracy
- Response Accuracy
- Faithfulness
- Intent Accuracy
- Response Completeness
- Citation Accuracy
- Conversational Flow

### 1.2 Chat with APIs
- API Selection Accuracy
- Parameter Accuracy
- Response Formatting
- Response Completeness
- Error Handling
- Privacy & Data Masking
- Multi-Step Reasoning

### 1.3 Chat with Databases
- Query Generation Accuracy
- Schema Understanding
- Result Accuracy
- Response Formatting
- Data Security

### 1.4 Common Areas
- Out-of-Scope Accuracy
- Guardrails Accuracy
- Prompt Injection Resistance
- Consistency
- Latency Awareness

## Cat 2: Multi-Agent\\nApplications
- Behavioral Accuracy
- Agent Accuracy
- Tool Call Accuracy
- Intent Resolution
- Task Adherence
- Memory & Context Preservation
- Orchestration Efficiency
- Error Recovery & Fallbacks
- Plan Accuracy

## Cat 3: Simple LLM Apps\\n(without Ground Truth)
- Tonality
- Response Accuracy
- Persona Consistency
- Coherence
- Conversational Flow
- Engagement Quality
- Empathy & Emotional Intelligence
- Out-of-Scope Accuracy
- Guardrails Accuracy
- Prompt Injection Resistance
`;

    const { Transformer } = window.markmap;
    const transformer = new Transformer();
    const { root } = transformer.transform(md);

    const { Markmap } = window.markmap;
    const mm = Markmap.create('#mindmap', {
      colorFreezeLevel: 2,
      initialExpandLevel: 3,
      maxWidth: 260,
      paddingX: 16,
    }, root);
  </script>
</body>
</html>
